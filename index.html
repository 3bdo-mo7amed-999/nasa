<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description"
        content="NASA – حلول كهرباء ودهانات احترافية في باريس. خدمات متكاملة للمباني السكنية والتجارية.">
    <meta name="keywords" content="NASA, ناسا, كهرباء, دهانات, باريس, électricité Paris, peinture Paris">
    <title>NASA | كهرباء ودهانات باريس</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #dfc278;
            --gold-dark: #9a7b2f;
            --navy: #0a1628;
            --navy-light: #12203a;
            --white: #ffffff;
            --cream: #f8f5f0;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #6b7280;
            --gray-800: #1f2937;
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.2);
            --shadow-gold: 0 8px 32px rgba(201, 168, 76, 0.25);
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: var(--white);
            color: var(--gray-800);
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        [dir="rtl"] body {
            direction: rtl;
            text-align: right;
            font-family: 'Cairo', 'Inter', sans-serif;
        }

        [dir="ltr"] body {
            direction: ltr;
            text-align: left;
            font-family: 'Inter', 'Cairo', sans-serif;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* HEADER */
        .site-header {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.4rem;
        }

        .logo-text {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: 2px;
        }

        .logo-text .gold-dot {
            color: var(--gold);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-dropdown {
            position: relative;
        }

        .lang-toggle {
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            color: var(--gray-800);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }

        .lang-toggle:hover {
            background: var(--gray-200);
        }

        .lang-toggle i {
            font-size: 0.7rem;
            transition: var(--transition);
        }

        .lang-dropdown.open .lang-toggle i {
            transform: rotate(180deg);
        }

        .lang-menu {
            position: absolute;
            top: 110%;
            right: 0;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            min-width: 160px;
            overflow: hidden;
            z-index: 2000;
            display: none;
            border: 1px solid var(--gray-200);
        }

        [dir="ltr"] .lang-menu {
            right: auto;
            left: 0;
        }

        .lang-dropdown.open .lang-menu {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .lang-option {
            width: 100%;
            padding: 12px 18px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: right;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-800);
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        [dir="ltr"] .lang-option {
            text-align: left;
        }

        .lang-option:hover {
            background: var(--cream);
        }

        .lang-option.active {
            background: var(--navy);
            color: var(--gold);
            font-weight: 700;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-nav {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .main-nav a {
            text-decoration: none;
            color: var(--gray-800);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 10px 16px;
            border-radius: 22px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .main-nav a:hover,
        .main-nav a.active-link {
            background: var(--navy);
            color: var(--white);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--navy);
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            box-shadow: var(--shadow-gold);
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background: var(--gold-dark);
            color: var(--white);
            transform: translateY(-2px);
        }

        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--navy);
            padding: 8px;
            border-radius: 8px;
        }

        .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mobile-menu-overlay.open {
            display: block;
            opacity: 1;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--white);
            z-index: 1600;
            box-shadow: var(--shadow-lg);
            transition: right 0.35s ease;
            padding: 24px;
            overflow-y: auto;
            flex-direction: column;
            gap: 8px;
        }

        [dir="ltr"] .mobile-menu {
            right: auto;
            left: -320px;
            transition: left 0.35s ease;
        }

        .mobile-menu.open {
            right: 0;
        }

        [dir="ltr"] .mobile-menu.open {
            left: 0;
            right: auto;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-200);
        }

        .mobile-menu-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-600);
        }

        .mobile-menu a {
            display: block;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--gray-800);
            font-weight: 600;
            font-size: 1rem;
            border-radius: 12px;
            transition: var(--transition);
        }

        .mobile-menu a:hover {
            background: var(--navy);
            color: var(--white);
        }

        @media (max-width: 968px) {

            .main-nav,
            .header-right .btn-primary {
                display: none;
            }

            .hamburger-btn {
                display: block;
            }

            .mobile-menu {
                display: flex;
            }
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--navy) 0%, #1a2744 50%, var(--navy-light) 100%);
            color: var(--white);
            padding: 80px 0 60px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero .container {
            position: relative;
            z-index: 1;
        }

        .hero-content {
            max-width: 650px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(201, 168, 76, 0.2);
            color: var(--gold-light);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(201, 168, 76, 0.3);
        }

        .hero h1 {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero h1 .gold-text {
            color: var(--gold);
        }

        .hero p {
            font-size: 1.1rem;
            color: #b0bfd1;
            margin-bottom: 28px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-outline-white {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .btn-outline-white:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width:768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero-content {
                text-align: center;
                max-width: 100%;
            }

            .hero-buttons {
                justify-content: center;
            }
        }

        /* SECTIONS */
        section {
            padding: 60px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 12px;
        }

        .section-desc {
            color: var(--gray-600);
            max-width: 600px;
            margin: 0 auto;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid var(--gray-200);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-icon {
            width: 52px;
            height: 52px;
            background: var(--cream);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1.4rem;
            color: var(--navy);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--navy);
        }

        .card p {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        /* PORTFOLIO CARDS */
        .project-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid var(--gray-200);
        }

        .project-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .project-thumb {
            height: 220px;
            background: var(--gray-100);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .project-thumb img,
        .project-thumb .thumb-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--navy-light), var(--navy));
            color: var(--gold);
            font-size: 3rem;
        }

        .project-thumb .media-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        [dir="rtl"] .project-thumb .media-badge {
            right: auto;
            left: 12px;
        }

        .project-preview {
            padding: 20px;
        }

        .project-preview h3 {
            color: var(--navy);
            margin-bottom: 4px;
        }

        .project-preview .location {
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-preview .short-desc {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .btn-details {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--navy);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-details:hover {
            background: var(--gold);
            color: var(--navy);
        }

        .btn-details i {
            transition: var(--transition);
        }

        .btn-details.expanded i {
            transform: rotate(180deg);
        }

        .project-details {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid var(--gray-200);
            margin-top: 16px;
            padding-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        .project-details.open {
            display: block;
        }

        .detail-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin: 16px 0;
        }

        .detail-gallery .gallery-item {
            height: 120px;
            background: var(--gray-100);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 2rem;
            position: relative;
            overflow: hidden;
        }

        .detail-gallery .gallery-item.video-item {
            background: var(--navy);
        }

        .detail-gallery .gallery-item .play-icon {
            position: absolute;
            color: white;
            font-size: 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-info {
            margin: 12px 0;
        }

        .detail-info p {
            margin: 6px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .detail-info i {
            color: var(--gold);
            margin-top: 4px;
        }

        .tag {
            display: inline-block;
            background: var(--cream);
            color: var(--navy);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 2px 4px;
        }

        .testimonial-card {
            background: var(--navy);
            color: white;
            padding: 28px;
            border-radius: var(--radius);
        }

        .testimonial-card .stars {
            color: var(--gold);
            margin-bottom: 8px;
        }

        .testimonial-card p {
            font-style: italic;
            margin: 8px 0;
        }

        .testimonial-card .author {
            color: var(--gold-light);
            font-weight: 600;
        }

        .testimonial-form {
            background: white;
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow-md);
            max-width: 700px;
            margin: 24px auto 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--navy);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: white;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .submit-btn:hover {
            background: var(--gold);
            color: var(--navy);
        }

        .bg-cream {
            background: var(--cream);
        }

        .process-step {
            text-align: center;
            padding: 20px;
        }

        .process-number {
            width: 44px;
            height: 44px;
            background: var(--gold);
            color: var(--navy);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 0 auto 12px;
        }

        .form-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            max-width: 750px;
            margin: 0 auto;
        }

        .site-footer {
            background: var(--navy);
            color: #b0bfd1;
            padding: 50px 0 25px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }

        .footer-grid h4 {
            color: white;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .footer-grid a {
            color: #b0bfd1;
            text-decoration: none;
            display: block;
            padding: 3px 0;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .footer-grid a:hover {
            color: var(--gold);
        }

        .social-links {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .social-links a {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .social-links a:hover {
            background: var(--gold);
            color: var(--navy);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            width: 56px;
            height: 56px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 28px rgba(37, 211, 102, 0.4);
            text-decoration: none;
            transition: var(--transition);
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        [dir="rtl"] .whatsapp-float {
            right: auto;
            left: 24px;
        }

        .hidden-page {
            display: none;
        }

        .active-page {
            display: block;
            animation: fadeIn 0.35s ease;
        }

        @media (max-width:600px) {
            .section-title {
                font-size: 1.7rem;
            }

            .form-card {
                padding: 24px;
            }

            .detail-gallery {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <div class="container header-inner">
            <a href="#" class="logo" data-nav="home">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <div class="logo-text">NASA<span class="gold-dot">.</span></div>
            </a>
            <div class="header-right">
                <nav class="main-nav" id="mainNav"></nav>
                <a href="#" class="btn-primary" data-nav="quote" id="ctaBtn"><i class="fas fa-file-invoice"></i>

          <div class="media-badge"><i class="fas ${p.hasVideo ? 'fa-video' : 'fa-camera'}"></i> ${p.images} ${p.hasVideo ? '+ فيديو' : ''}</div>
        </div>
        <div class="project-preview">
          <h3>${p.name}</h3>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
          <p class="short-desc">${p.shortDesc}</p>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">${p.tags.map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
          <button class="btn-details" data-project="${i}">
            <span>${t('viewDetails')}</span> <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="project-details" id="projectDetail${i}">
          <p style="margin-bottom:12px;">${p.fullDesc}</p>
          <div class="detail-info">
            <p><i class="fas fa-map-marker-alt"></i> <strong>${currentLang === 'ar' ? 'الموقع' : 'Location'}:</strong> ${p.location}</p>
            <p><i class="fas fa-tools"></i> <strong>${currentLang === 'ar' ? 'نوع المشروع' : 'Type'}:</strong> ${p.tags.join('، ')}</p>
          </div>
          <h4 style="margin:12px 0 8px;">${currentLang === 'ar' ? 'معرض الصور' : 'Gallery'}</h4>
          <div class="detail-gallery">
            ${Array.from({ length: p.images }, (_, j) => `<div class="gallery-item"><i class="fas fa-image"></i></div>`).join('')}
            ${p.hasVideo ? `<div class="gallery-item video-item"><div class="play-icon"><i class="fas fa-play"></i></div></div>` : ''}
          </div>
        </div>
      </div>
    `).join('');

                // Bind toggle buttons
                projectsContainer.querySelectorAll('.btn-details').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const idx = this.dataset.project;
                        const detail = document.getElementById('projectDetail' + idx);
                        const isOpen = detail.classList.contains('open');
                        detail.classList.toggle('open');
                        this.classList.toggle('expanded');
                        this.querySelector('span').textContent = isOpen ? t('viewDetails') : t('hideDetails');
                    });
                });
            }

            bindContentLinks();
            document.getElementById('quoteForm')?.addEventListener('submit', e => { e.preventDefault(); document.getElementById('formSuccess').style.display = 'block' });
            document.getElementById('testimonialForm')?.addEventListener('submit', e => { e.preventDefault(); document.getElementById('testimonialSuccess').style.display = 'block' });
        }

        function bindContentLinks() {
            document.querySelectorAll('#pageContent [data-nav]').forEach(el => el.addEventListener('click', e => { e.preventDefault(); navigateTo(el.dataset.nav) }));
        }
        function navigateTo(p) { if (pages.includes(p)) { currentPage = p; renderPage(); buildDesktopNav(); buildMobileNav(); window.scrollTo({ top: 0, behavior: 'smooth' }) } }

        updateDir(); buildAll(); renderPage();
    </script>
</body>

</html>
